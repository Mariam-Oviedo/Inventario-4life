<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Productos Naturales</title>
    <style>
        :root {
            --azul-oscuro: #0d47a1;
            --azul-medio: #1976d2;
            --azul-claro: #e3f2fd;
            --blanco: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; padding: 20px; color: #333; }
        .container { max-width: 950px; margin: auto; background: var(--blanco); padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-top: 8px solid var(--azul-oscuro); }
        h2 { color: var(--azul-oscuro); text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .formulario { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; background: var(--azul-claro); padding: 20px; border-radius: 10px; }
        input { padding: 12px; border: 1px solid #bbdefb; border-radius: 6px; font-size: 15px; }
        input:focus { outline: none; border-color: var(--azul-medio); box-shadow: 0 0 5px rgba(25, 118, 210, 0.3); }
        .btn-guardar { grid-column: span 2; background: var(--azul-oscuro); color: white; border: none; padding: 15px; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-guardar:hover { background: var(--azul-medio); transform: translateY(-1px); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; overflow: hidden; border-radius: 8px; }
        th { background-color: var(--azul-oscuro); color: white; padding: 15px; text-transform: uppercase; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #e1e8ed; text-align: center; background-color: white; }
        tr:hover td { background-color: #f9fbff; }
        .btn-editar { background: #2196f3; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; margin-right: 5px; }
        .btn-eliminar { background: #ef5350; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
        .btn-editar:hover { background: #1976d2; }
        .btn-eliminar:hover { background: #c62828; }
        .precio { font-weight: bold; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔹 Inventario de Productos Naturales</h2>
        <div class="formulario">
            <input type="hidden" id="prod-id">
            <input type="text" id="nombre" placeholder="Nombre del Producto">
            <input type="number" id="precio_socio" placeholder="Precio Socio ($)">
            <input type="number" id="precio_cliente" placeholder="Precio Cliente ($)">
            <input type="number" id="cantidad" placeholder="Cantidad Disponible">
            <button onclick="guardarProducto()" class="btn-guardar">💾 GUARDAR PRODUCTO</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>P. Socio</th>
                    <th>P. Cliente</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="lista-productos"></tbody>
        </table>
    </div>

    <script>
        const API_URL = 'https://inventario-4life.onrender.com/productos';

        async function cargarProductos() {
            try {
                const res = await fetch(API_URL);
                const productos = await res.json();
                const tabla = document.getElementById('lista-productos');
                tabla.innerHTML = '';
                productos.forEach(p => {
                    tabla.innerHTML += `
                        <tr>
                            <td style="text-align: left; padding-left: 20px;"><strong>${p.nombre}</strong></td>
                            <td class="precio">$${p.precio_socio}</td>
                            <td class="precio">$${p.precio_cliente}</td>
                            <td>${p.cantidad}</td>
                            <td>
                                <button class="btn-editar" onclick='cargarEnFormulario(${JSON.stringify(p)})'>Editar</button>
                                <button class="btn-eliminar" onclick="eliminarProducto(${p.id})">Eliminar</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) { console.error("Error:", error); }
        }

        async function guardarProducto() {
            const id = document.getElementById('prod-id').value;
            const data = {
                nombre: document.getElementById('nombre').value,
                precio_socio: document.getElementById('precio_socio').value,
                precio_cliente: document.getElementById('precio_cliente').value,
                cantidad: document.getElementById('cantidad').value
            };

            if(!data.nombre || !data.precio_socio) return alert("Por favor llena los datos");

            const metodo = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            await fetch(url, {
                method: metodo,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            limpiarFormulario();
            cargarProductos();
        }

        async function eliminarProducto(id) {
            if(confirm('¿Deseas eliminar este registro?')) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                cargarProductos();
            }
        }

        function cargarEnFormulario(p) {
            document.getElementById('prod-id').value = p.id;
            document.getElementById('nombre').value = p.nombre;
            document.getElementById('precio_socio').value = p.precio_socio;
            document.getElementById('precio_cliente').value = p.precio_cliente;
            document.getElementById('cantidad').value = p.cantidad;
            window.scrollTo(0,0);
        }

        function limpiarFormulario() {
            document.getElementById('prod-id').value = '';
            document.getElementById('nombre').value = '';
            document.getElementById('precio_socio').value = '';
            document.getElementById('precio_cliente').value = '';
            document.getElementById('cantidad').value = '';
        }

        cargarProductos();
    </script>
</body>
</html>
