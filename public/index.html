<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Natural🔹</title>
    <style>
        :root {
            --azul-oscuro: #0d47a1;
            --azul-medio: #1976d2;
            --azul-claro: #e3f2fd;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; padding: 10px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-top: 8px solid var(--azul-oscuro); }
        h2 { color: var(--azul-oscuro); text-align: center; font-size: 1.5rem; }
        
        /* Formulario adaptable */
        .formulario { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 25px; background: var(--azul-claro); padding: 15px; border-radius: 10px; }
        @media (min-width: 600px) { .formulario { grid-template-columns: 1fr 1fr; } }
        
        input { padding: 12px; border: 1px solid #bbdefb; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .btn-guardar { background: var(--azul-oscuro); color: white; border: none; padding: 15px; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 16px; width: 100%; grid-column: 1 / -1; }

        /* Tabla Responsiva: Se convierte en bloques en el celular */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        thead { display: none; } /* Escondemos cabecera en móvil */
        tr { display: block; margin-bottom: 15px; border: 1px solid #e1e8ed; border-radius: 10px; padding: 10px; background: #fff; box-shadow: 2px 2px 5px rgba(0,0,0,0.03); }
        td { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #f0f0f0; font-size: 14px; text-align: right; }
        td::before { content: attr(data-label); font-weight: bold; text-align: left; color: var(--azul-oscuro); }
        td:last-child { border-bottom: none; justify-content: center; gap: 10px; padding-top: 15px; }

        /* Estilo para PC (Pantallas grandes) */
        @media (min-width: 768px) {
            thead { display: table-header-group; }
            tr { display: table-row; }
            td { display: table-cell; text-align: center; border-bottom: 1px solid #e1e8ed; }
            td::before { content: none; }
            .container { padding: 30px; }
        }

        .btn-editar { background: #2196f3; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; flex: 1; }
        .btn-eliminar { background: #ef5350; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; flex: 1; }
        .precio { font-weight: bold; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔹 Mi Inventario Natural</h2>
        <div class="formulario">
            <input type="hidden" id="prod-id">
            <input type="text" id="nombre" placeholder="Nombre del Producto">
            <input type="number" id="precio_socio" placeholder="Precio Socio ($)">
            <input type="number" id="precio_cliente" placeholder="Precio Cliente ($)">
            <input type="number" id="cantidad" placeholder="Cantidad disponible">
            <button onclick="guardarProducto()" class="btn-guardar">💾 GUARDAR PRODUCTO</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>P. Socio</th>
                    <th>P. Cliente</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="lista-productos"></tbody>
        </table>
    </div>

    <script>
        const API_URL = 'https://inventario-4life.onrender.com/productos';

        async function cargarProductos() {
            try {
                const res = await fetch(API_URL);
                const productos = await res.json();
                const tabla = document.getElementById('lista-productos');
                tabla.innerHTML = '';
                productos.forEach(p => {
                    tabla.innerHTML += `
                        <tr>
                            <td data-label="Producto"><strong>${p.nombre}</strong></td>
                            <td data-label="P. Socio" class="precio">$${p.precio_socio}</td>
                            <td data-label="P. Cliente" class="precio">$${p.precio_cliente}</td>
                            <td data-label="Stock">${p.cantidad}</td>
                            <td>
                                <button class="btn-editar" onclick='cargarEnFormulario(${JSON.stringify(p)})'>Editar</button>
                                <button class="btn-eliminar" onclick="eliminarProducto(${p.id})">Borrar</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) { console.error("Error:", error); }
        }

        async function guardarProducto() {
            const id = document.getElementById('prod-id').value;
            const data = {
                nombre: document.getElementById('nombre').value,
                precio_socio: document.getElementById('precio_socio').value,
                precio_cliente: document.getElementById('precio_cliente').value,
                cantidad: document.getElementById('cantidad').value
            };
            if(!data.nombre) return alert("Escribe el nombre");

            const metodo = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            await fetch(url, {
                method: metodo,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            limpiarFormulario();
            cargarProductos();
        }

        async function eliminarProducto(id) {
            if(confirm('¿Borrar este producto?')) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                cargarProductos();
            }
        }

        function cargarEnFormulario(p) {
            document.getElementById('prod-id').value = p.id;
            document.getElementById('nombre').value = p.nombre;
            document.getElementById('precio_socio').value = p.precio_socio;
            document.getElementById('precio_cliente').value = p.precio_cliente;
            document.getElementById('cantidad').value = p.cantidad;
            window.scrollTo(0,0);
        }

        function limpiarFormulario() {
            document.getElementById('prod-id').value = '';
            document.getElementById('nombre').value = '';
            document.getElementById('precio_socio').value = '';
            document.getElementById('precio_cliente').value = '';
            document.getElementById('cantidad').value = '';
        }
        cargarProductos();
    </script>
</body>
</html>
