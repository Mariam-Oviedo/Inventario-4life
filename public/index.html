<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Natural🔹</title>
    <style>
        :root {
            --azul-oscuro: #0d47a1;
            --azul-medio: #1976d2;
            --azul-claro: #e3f2fd;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; padding: 10px; }
        
        .container { max-width: 100%; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--azul-oscuro); }
        
        h2 { color: var(--azul-oscuro); text-align: center; font-size: 1.3rem; margin-top: 0; }
        
        /* Formulario */
        .formulario { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; background: var(--azul-claro); padding: 15px; border-radius: 10px; }
        input { padding: 12px; border: 1px solid #bbdefb; border-radius: 8px; font-size: 16px; width: 100%; }
        .btn-guardar { background: var(--azul-oscuro); color: white; border: none; padding: 15px; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 16px; }

        /* Lista de productos modo Tarjetas para Celular */
        .producto-card {
            background: #fff;
            border: 1px solid #e1e8ed;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .dato { display: flex; justify-content: space-between; border-bottom: 1px f0f0f0 solid; padding: 4px 0; }
        .label { font-weight: bold; color: var(--azul-oscuro); }
        
        .acciones { display: flex; gap: 10px; margin-top: 10px; }
        .btn-editar { background: #2196f3; color: white; border: none; padding: 10px; border-radius: 6px; flex: 1; font-weight: bold; }
        .btn-eliminar { background: #ef5350; color: white; border: none; padding: 10px; border-radius: 6px; flex: 1; font-weight: bold; }

        /* Para pantallas grandes (PC) */
        @media (min-width: 768px) {
            .container { max-width: 800px; padding: 30px; }
            .formulario { display: grid; grid-template-columns: 1fr 1fr; }
            .btn-guardar { grid-column: span 2; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔹 Mi Inventario Natural</h2>
        <div class="formulario">
            <input type="hidden" id="prod-id">
            <input type="text" id="nombre" placeholder="Nombre del Producto">
            <input type="number" id="precio_socio" placeholder="Precio Socio ($)">
            <input type="number" id="precio_cliente" placeholder="Precio Cliente ($)">
            <input type="number" id="cantidad" placeholder="Cantidad disponible">
            <button onclick="guardarProducto()" class="btn-guardar">💾 GUARDAR PRODUCTO</button>
        </div>

        <div id="lista-productos">
            </div>
    </div>

    <script>
        const API_URL = 'https://inventario-4life.onrender.com/productos';

        async function cargarProductos() {
            const res = await fetch(API_URL);
            const productos = await res.json();
            const contenedor = document.getElementById('lista-productos');
            contenedor.innerHTML = '';
            
            productos.forEach(p => {
                contenedor.innerHTML += `
                    <div class="producto-card">
                        <div class="dato"><span class="label">Producto:</span> <span>${p.nombre}</span></div>
                        <div class="dato"><span class="label">P. Socio:</span> <span>$${p.precio_socio}</span></div>
                        <div class="dato"><span class="label">P. Cliente:</span> <span>$${p.precio_cliente}</span></div>
                        <div class="dato"><span class="label">Stock:</span> <span>${p.cantidad}</span></div>
                        <div class="acciones">
                            <button class="btn-editar" onclick='cargarEnFormulario(${JSON.stringify(p)})'>Editar</button>
                            <button class="btn-eliminar" onclick="eliminarProducto(${p.id})">Borrar</button>
                        </div>
                    </div>
                `;
            });
        }

        async function guardarProducto() {
            const id = document.getElementById('prod-id').value;
            const data = {
                nombre: document.getElementById('nombre').value,
                precio_socio: document.getElementById('precio_socio').value,
                precio_cliente: document.getElementById('precio_cliente').value,
                cantidad: document.getElementById('cantidad').value
            };
            const metodo = id ? 'PUT' : 'POST';
            await fetch(id ? `${API_URL}/${id}` : API_URL, {
                method: metodo,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            limpiarFormulario();
            cargarProductos();
        }

        async function eliminarProducto(id) {
            if(confirm('¿Borrar producto?')) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                cargarProductos();
            }
        }

        function cargarEnFormulario(p) {
            document.getElementById('prod-id').value = p.id;
            document.getElementById('nombre').value = p.nombre;
            document.getElementById('precio_socio').value = p.precio_socio;
            document.getElementById('precio_cliente').value = p.precio_cliente;
            document.getElementById('cantidad').value = p.cantidad;
            window.scrollTo(0,0);
        }

        function limpiarFormulario() {
            document.getElementById('prod-id').value = '';
            document.getElementById('nombre').value = '';
            document.getElementById('precio_socio').value = '';
            document.getElementById('precio_cliente').value = '';
            document.getElementById('cantidad').value = '';
        }
        cargarProductos();
    </script>
</body>
</html>
